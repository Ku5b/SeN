<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التصاميم الرقمية - الستايل الفاخر</title>
    <!-- استدعاء خط Cairo الاحترافي -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- أيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* درجات العنابي والذهبي المتناسقة مع صورتك */
            --main-gold: #d4af37; 
            --light-gold: #f3e5ab;
            --text-color: #ffffff;
            --success-color: #2ecc71;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            /* هنا نضع صورتك كخلفية للموقع بالكامل وتثبيتها */
            background-image: url('image_2.png'); /* ارفع الصورة بنفس المجلد وسمها image_2.png أو ضع رابطها هنا */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-color);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* إضافة طبقة داكنة خفيفة فوق الخلفية لزيادة وضوح النصوص */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 7, 10, 0.4); /* تظليل خفيف جداً متناسق مع العنابي */
            z-index: -1;
        }

        /* الهيدر / شريط التنقل */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(27, 11, 16, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 700;
            color: var(--main-gold);
        }

        .menu-btn {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-color);
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* كرت المنتج بستايل زجاجي شفاف يعكس الخلفية العنابية */
        .product-card {
            background: rgba(35, 16, 22, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            margin-bottom: 40px;
        }

        .product-img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 20px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .product-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .product-desc {
            font-size: 14px;
            color: #e2d4dc;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .product-price {
            font-size: 26px;
            font-weight: 700;
            color: var(--main-gold);
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(214, 175, 87, 0.3);
        }

        /* زر إضافة للسلة بستايل ذهبي فاخر متناسق */
        .add-to-cart-btn {
            background: linear-gradient(135deg, var(--main-gold), #b8901c);
            color: #1b0b10;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 6px 20px rgba(214, 175, 87, 0.25);
        }

        .add-to-cart-btn:active {
            transform: scale(0.97);
        }

        /* قسم آراء العملاء */
        .reviews-section {
            text-align: center;
            margin-top: 10px;
        }

        .reviews-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--main-gold);
            margin-bottom: 5px;
        }

        .reviews-subtitle {
            font-size: 14px;
            color: #bfa3b2;
            margin-bottom: 25px;
        }

        /* إشعار التنبيه النابثق (Toast) */
        .toast-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2ecc71;
            color: white;
            padding: 14px 25px;
            border-radius: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.4);
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
            justify-content: center;
        }

        .toast-notification.show {
            top: 30px;
        }

        /* زر السلة العائم الذهبي */
        .floating-cart {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--main-gold), #b8901c);
            color: #1b0b10;
            width: 60px;
            height: 60px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(214, 175, 87, 0.4);
            z-index: 999;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            left: -5px;
            background-color: #ef4444;
            color: white;
            font-size: 12px;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #1b0b10;
        }
    </style>
</head>
<body>

    <!-- الإشعار المنبثق -->
    <div class="toast-notification" id="toast">
        <i class="fas fa-check-circle"></i>
        <span>تم إضافة المنتج إلى السلة بنجاح!</span>
    </div>

    <!-- الهيدر -->
    <header>
        <div class="menu-btn"><i class="fas fa-bars"></i></div>
        <div class="logo-area">
            <span>متجر التصاميم</span>
            <i class="fab fa-foursquare"></i>
        </div>
    </header>

    <!-- المحتوى الرئيسي -->
    <div class="container">
        
        <!-- كرت المنتج -->
        <div class="product-card">
            <!-- استبدل الرابط بصورة غلاف المنتج الخاص بك -->
            <img src="https://via.placeholder.com/500x250/2d131e/ffffff?text=Premium+Design" alt="حزمة التصاميم" class="product-img">
            
            <h2 class="product-title">حزمة التصاميم الشاملة</h2>
            <p class="product-desc">مجموعة شاملة من التصاميم والقوالب الجاهزة للاستخدام الاحترافي بلمسات فاخرة.</p>
            
            <div class="product-price">5 ريال</div>
            
            <button class="add-to-cart-btn" onclick="addToCart()">
                <i class="fas fa-shopping-cart"></i>
                إضافة للسلة
            </button>
        </div>

        <!-- قسم الآراء -->
        <div class="reviews-section">
            <h2 class="reviews-title">آراء العملاء</h2>
            <p class="reviews-subtitle">ما يقوله عملاؤنا عن خدماتنا</p>
        </div>

    </div>

    <!-- زر السلة العائم -->
    <div class="floating-cart">
        <i class="fas fa-shopping-cart"></i>
        <div class="cart-badge" id="cart-count">0</div>
    </div>

    <script>
        let cartCount = 0;

        function addToCart() {
            cartCount++;
            document.getElementById('cart-count').innerText = cartCount;

            const toast = document.getElementById('toast');
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
